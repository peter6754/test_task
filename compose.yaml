services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      APP_ENV: dev
      APP_SECRET: ${APP_SECRET:-docker-dev-secret}
      APP_SHARE_DIR: var/share
      DATABASE_URL: "mysql://app:app@database:3306/app?serverVersion=8.0&charset=utf8mb4"
    volumes:
      - ./:/app
      - composer_cache:/tmp/composer-cache
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-papp"]
      timeout: 5s
      retries: 5
      interval: 10s
      start_period: 60s
    volumes:
      - mysql_data:/var/lib/mysql:rw
      - ./dump.sql:/docker-entrypoint-initdb.d/010-dump.sql:ro

volumes:
  composer_cache:
  mysql_data:
